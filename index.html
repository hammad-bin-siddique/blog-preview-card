<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Preview  Card</title>
    <link rel="shortcut icon" href="images/favicon-32x32.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="blog-card">
        <div class="blog-img">
            <img src="images/illustration-article.svg" alt="Feature Image">
        </div>
        <div class="blog-content">
            <p class="blog-category">
                Learning
            </p>
            <p class="date">Published 21 Dec 2023 </p>
            <h1 class="blog-title">
                 HTML & CSS foundations 
            </h1>
            <p class="blog-discription">
                These languages are the backbone of every website, defining structure, content, and presentation. Greg Hooper 
            </p>
            <div class="author">
                
                    <img src="images/image-avatar.webp" alt="Author Image">
                    <p>Greg Hooper </p>
            </div>
        </div>
    </main>
</body>
</html>
